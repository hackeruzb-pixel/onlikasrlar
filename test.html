<!doctype html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Premium Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
color:#222;
}

.section{
width:900px;
margin:40px 0;
padding:40px;
background:white;
border-radius:25px;
box-shadow:0 25px 70px rgba(0,0,0,0.08);
text-align:center;
}

h1{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
background-clip: padding-box;
-webkit-background-clip:text;
color:transparent;
}

input{
padding:14px;
width:85%;
border:2px solid #eee;
border-radius:12px;
margin-bottom:20px;
}

.btn{
padding:12px 28px;
border:none;
border-radius:30px;
cursor:pointer;
margin:8px;
font-weight:bold;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
color:white;
transition:0.3s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.option{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border-radius:14px;
border:2px solid #eee;
cursor:pointer;
transition:0.3s;
background:white;
text-align:left;
}

.option:hover{
background:#f3f4f6;
}

.correct{
background:#22c55e !important;
color:white;
border:none;
}

.wrong{
background:#ef4444 !important;
color:white;
border:none;
}

.progress{
width:100%;
height:10px;
background:#eee;
border-radius:20px;
margin:20px 0;
}

.progress-bar{
height:10px;
width:0%;
background:linear-gradient(90deg,#4f46e5,#06b6d4);
border-radius:20px;
transition:0.4s;
}

/* ===== CERTIFICATE ===== */

.certificate{
display:none;
margin-top:40px;
padding:100px 80px;
border-radius:25px;
background:white;
box-shadow:0 40px 120px rgba(0,0,0,0.12);
position:relative;
text-align:center;
}

.certificate::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:15px;
background:linear-gradient(90deg,#4f46e5,#06b6d4);
}

.cert-title{
font-size:42px;
font-weight:bold;
letter-spacing:3px;
margin-bottom:30px;
}

.cert-text{
font-size:18px;
line-height:1.8;
max-width:700px;
margin:0 auto 30px auto;
color:#444;
}

/* ISM YANGI DIZAYN */
.cert-name{
display:block;
font-size:34px;
font-weight:700;
margin:30px 0 10px 0;
color:#111;
}

.name-line{
width:300px;
height:3px;
background:linear-gradient(90deg,#4f46e5,#06b6d4);
margin:0 auto 30px auto;
border-radius:10px;
}

.badge{
margin-top:20px;
display:inline-block;
padding:14px 40px;
border-radius:50px;
font-weight:bold;
font-size:18px;
}

.gold .badge{
background:linear-gradient(135deg,#fceabb,#f8b500);
color:black;
}
.silver .badge{
background:linear-gradient(135deg,#e5e7eb,#9ca3af);
color:black;
}
.bronze .badge{
background:linear-gradient(135deg,#cd7f32,#a97142);
color:white;
}

.seal{
position:absolute;
top:40px;
right:40px;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#fceabb,#f8b500);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#7a5d00;
transform:rotate(-15deg);
}

.signature{
margin-top:60px;
display:flex;
justify-content:space-between;
}

.sign-line{
width:220px;
height:2px;
background:#333;
margin-bottom:8px;
}

.qr-box{
margin-top:40px;
display:flex;
justify-content:center;
}
.back-btn{
position: absolute;
top:20px;
left:20px;
z-index:1000;
}

.section{
position: relative;
}

.back-btn a{
display:inline-block;
padding:12px 26px;
background: linear-gradient(45deg,#15daec,#36def4);
color:white;
text-decoration:none;
font-weight:bold;
border-radius:30px;
transition:0.3s;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.back-btn a:hover{
transform: translateY(-3px);
}
</style>
</head>

<body>

<section class="section">
<section class="section">

<div class="back-btn">
<a href="index.html">⬅ Asosiy sahifaga qaytish</a>
</div>

<h1> Test</h1>
<input type="text" id="name" placeholder="Ism Familiya">

<button class="btn" onclick="startTest()">Testni boshlash</button>
<button class="btn" onclick="restartTest()">Qayta boshlash</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="quiz"></div>

<h2 id="scoreText"></h2>
<h3 id="rankText"></h3>

<button class="btn" id="certificateBtn" onclick="showCertificate()" style="display:none;">
Sertifikat olish
</button>

<div class="certificate" id="certificate">

<div class="seal">OFFICIAL</div>

<div class="cert-title">SERTIFIKAT</div>

<div class="cert-text">
“O'nli kaslar” mavzusida o‘tkazilgan namunali ochiq darsda aktiv va yuqori natija korsatgani uchun sertifikat bilan taqdirlanadi!
</div>

<span class="cert-name" id="certName"></span>
<div class="name-line"></div>

<div id="certScore"></div>
<div class="badge" id="certRank"></div>

<div class="qr-box">
<div id="qrcode"></div>
</div>

<div class="signature">
<div>
<div class="sign-line"></div>
Direktor
</div>
<div>
<div class="sign-line"></div>
Sana: <span id="certDate"></span>
</div>
</div>

<br><br>
<button class="btn" onclick="savePDF()">PDF yuklash</button>

</div>

</section>

<script>

let current=0;
let score=0;
let questions = [
{q:"O‘nli kasrda vergul nimani ajratadi?", options:["Butun va kasr qismini","Faqat kasr qismini","Faqat butun qismini"], answer:0},

{q:"0,5 o‘nli kasr qanday o‘qiladi?", options:["Besh o‘ndan bir","Besh yuzdan bir","Besh"], answer:0},

{q:"1,25 sonida nechta o‘nli xona bor?", options:["1 xona","2 xona","3 xona"], answer:1},

{q:"0,3 + 0,2 nechaga teng?", options:["0,5","0,6","0,4"], answer:0},

{q:"2,4 soni 2 dan qanday farq qiladi?", options:["0,4 ga kichik","Teng","0,4 ga katta"], answer:2},

{q:"0,75 kasr qanday yoziladi?", options:["75/100","7/5","5/7"], answer:0},

{q:"0,1 + 0,2 + 0,3 nechaga teng?", options:["0,6","0,5","0,7"], answer:0},

{q:"3,5 sonida 5 qanday qiymatga ega?", options:["5 birlik","5 o‘ndan bir","5 yuzdan bir"], answer:1},

{q:"0,9 soni 1 dan:", options:["Kichik","Katta","Teng"], answer:0},

{q:"2,50 va 2,5 sonlari:", options:["Farqli","Biri katta","Teng",], answer:2},

{q:"0,4 + 0,6 =", options:["1","0,9","1,1"], answer:0},

{q:"1,2 + 0,8 =", options:["1","2,1","2"], answer:2},

{q:"3,6 - 1,2 =", options:["3,4","2,4","1,4"], answer:1},

{q:"0,25 + 0,25 =", options:["0,5","0,45","0,55"], answer:0},

{q:"4,5 - 2,5 =", options:["3","1","2"], answer:2},

{q:"0,7 + 0,2 =", options:["0,9","0,8","1"], answer:0}
];

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function startTest(){
let name=document.getElementById("name").value.trim();
if(name===""){alert("Ism kiriting!");return;}
questions=shuffle(questions);
current=0;
score=0;
document.getElementById("certificate").style.display="none";
document.getElementById("certificateBtn").style.display="none";
loadQuiz();
}

function restartTest(){
current=0;
score=0;
document.getElementById("quiz").innerHTML="";
document.getElementById("progressBar").style.width="0%";
document.getElementById("scoreText").innerText="";
document.getElementById("rankText").innerText="";
document.getElementById("certificate").style.display="none";
document.getElementById("certificateBtn").style.display="none";
}

function loadQuiz(){
if(current>=questions.length){finishTest();return;}
let q=questions[current];
let html=`<h3>${current+1}. ${q.q}</h3>`;
q.options.forEach((opt,i)=>{
html+=`<button class="option" onclick="check(this,${i})">${opt}</button>`;
});
document.getElementById("quiz").innerHTML=html;
document.getElementById("progressBar").style.width=
((current/questions.length)*100)+"%";
}

function check(btn,index){
let correct=questions[current].answer;
let buttons=document.querySelectorAll(".option");
buttons.forEach((b,i)=>{
b.disabled=true;
if(i===correct) b.classList.add("correct");
if(i===index && index!==correct) b.classList.add("wrong");
});
if(index===correct) score+=10;
setTimeout(()=>{current++;loadQuiz();},800);
}

function finishTest(){
document.getElementById("quiz").innerHTML="";
document.getElementById("scoreText").innerText="Ball: "+score+"/100";

let cert=document.getElementById("certificate");
cert.className="certificate";

if(score>=80){
document.getElementById("rankText").innerText="OLTIN SERTIFIKAT";
cert.classList.add("gold");
}
else if(score>=60){
document.getElementById("rankText").innerText="KUMUSH SERTIFIKAT";
cert.classList.add("silver");
}
else{
document.getElementById("rankText").innerText="BRONZA SERTIFIKAT";
cert.classList.add("bronze");
}

document.getElementById("certificateBtn").style.display="inline-block";
}

function showCertificate(){
let cert=document.getElementById("certificate");
cert.style.display="block";

let name=document.getElementById("name").value;
let today=new Date().toLocaleDateString();

document.getElementById("certName").innerText=name;
document.getElementById("certScore").innerText="Natija: "+score+"/100";
document.getElementById("certDate").innerText=today;
document.getElementById("certRank").innerText=
document.getElementById("rankText").innerText;

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text: name + " | Ball: " + score,
width:110,
height:110
});
}

function savePDF(){
html2canvas(document.getElementById("certificate")).then(canvas=>{
const imgData=canvas.toDataURL("image/png");
const { jsPDF } = window.jspdf;
let pdf=new jsPDF("p","mm","a4");
let width=190;
let height=canvas.height * width / canvas.width;
pdf.addImage(imgData,'PNG',10,10,width,height);
pdf.save("sertifikat.pdf");
});
}

</script>

</body>
</html>
